name: 自动同步上游发布包
on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨自动检查
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 同步上游发布
        uses: aminya/sync-releases@v1
        with:
          source: "iOfficeAI/AionUi"  # 替换成原仓库的地址，比如"octocat/hello-world"
          token: ${{ secrets.GITHUB_TOKEN }}
